# LoRA / full fine-tuning default config
# Phase 2 adaptation comparison; MERT linear probe uses default_supervised.yaml instead.

training:
  batch_size: 4
  num_workers: 4
  max_epochs: 30
  early_stopping:
    monitor: val_macro_f1
    mode: max
    patience: 5
  optimizer:
    name: AdamW
    weight_decay: 1.0e-4
  scheduler:
    name: CosineAnnealingLR
    T_max: 30
  grad_clip_norm: 1.0
  precision: fp32

evaluation:
  batch_size: 8
  num_workers: 4

device: auto
