# Phase 3 MERT full fine-tuning config
# Same model/hyperparams as Phase 2; adds Phase 3 subset fields.

version: mert_full_finetune_exp03_v1
method: mert_full_ft
method_short: mert_full_ft
model: mert_v1_95m
experiment_id: exp03_mert_full_ft
phase: 3

data:
  dataset_config: configs/data/dataset_v1.yaml

model_config:
  model_name: m-a-p/MERT-v1-95M
  model_cache_dir: model_cache/huggingface
  adaptation_mode: full_ft

training:
  inherit_from: configs/train/default_adaptation.yaml
  optimizer:
    lr: 5.0e-5

subset_config: configs/data/phase3_subsample_v1.yaml

output:
  base_dir: runs/exp03_data_efficiency/mert_full_ft
